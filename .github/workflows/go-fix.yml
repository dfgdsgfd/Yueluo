name: Go Fix Weekly

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  go-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend-gin/go.sum

      - name: Install libvips (required by govips)
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Run go fix and update dependencies
        working-directory: backend-gin
        run: |
          go fix ./...
          go get -u ./...
          go mod tidy

      - name: Check for changes
        id: diff
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: auto go fix ./..."
          title: "chore: auto go fix $(date -u +%Y-%m-%d)"
          body: |
            Automated `go fix ./...` run with Go 1.26.

            - Trigger: ${{ github.event_name == 'schedule' && 'Weekly schedule' || 'Manual dispatch' }}
            - Date: $(date -u +%Y-%m-%d)
          branch: auto/go-fix
          base: main
          delete-branch: true
