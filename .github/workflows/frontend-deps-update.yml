name: Frontend Deps Update

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: front-end-nextjs/package-lock.json

      - name: Update dependencies (exclude ESLint)
        working-directory: front-end-nextjs
        run: |
          npx --yes npm-check-updates@22.2.3 --upgrade --target latest --reject '/^eslint/'

          # Tiptap packages use exact peer versions internally. Reusing the old
          # lockfile can leave npm resolving a mixture of old and new versions.
          rm -f package-lock.json
          npm install --package-lock-only
          npm ci

      - name: Check for changes
        id: diff
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify build
        if: steps.diff.outputs.changed == 'true'
        working-directory: front-end-nextjs
        run: npm run build

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: auto update frontend deps"
          title: "chore: auto update frontend deps $(date -u +%Y-%m-%d)"
          body: |
            Automated frontend dependency update (excludes ESLint).

            - Updated with `ncu --target latest`
            - Build verified successfully
            - Trigger: ${{ github.event_name == 'schedule' && 'Weekly schedule' || 'Manual dispatch' }}
            - Date: $(date -u +%Y-%m-%d)
          branch: auto/frontend-deps-update
          base: main
          delete-branch: true
