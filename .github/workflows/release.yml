name: Build release artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(github.event_name == 'workflow_dispatch'
          && '[{"goos":"linux","goarch":"amd64","suffix":""},{"goos":"windows","goarch":"amd64","suffix":".exe"}]'
          || '[{"goos":"linux","goarch":"amd64","suffix":""}]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend-gin/go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: front-end-nextjs/package-lock.json

      - name: Build backend
        working-directory: backend-gin
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          BUILD_TIME: ${{ github.event.repository.updated_at }}
        run: |
          mkdir -p ../dist
          go build -trimpath \
            -ldflags="-s -w -X 'yuem-go/backend-gin/internal/buildinfo.VersionTag=${GITHUB_REF_NAME}' -X 'yuem-go/backend-gin/internal/buildinfo.CommitHash=${GITHUB_SHA}' -X 'yuem-go/backend-gin/internal/buildinfo.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)' -X 'yuem-go/backend-gin/internal/buildinfo.GitHubRunID=${GITHUB_RUN_ID}'" \
            -o "../dist/yuem-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}" ./cmd/api
          cat > "../dist/backend-version-${{ matrix.goos }}-${{ matrix.goarch }}.json" <<EOF
          {
            "version_tag": "${GITHUB_REF_NAME}",
            "commit_hash": "${GITHUB_SHA}",
            "build_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "github_run_id": "${GITHUB_RUN_ID}"
          }
          EOF

      - name: Type-check frontend
        working-directory: front-end-nextjs
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          npm ci
          node scripts/write-version.mjs
          npx tsc --noEmit

      - name: Write checksums
        working-directory: dist
        run: find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
