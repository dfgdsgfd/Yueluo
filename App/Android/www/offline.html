<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#121212" />
    <title>月梦-快速版连接异常</title>
    <style>
      :root{color-scheme:dark;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
      *{box-sizing:border-box}
      html,body{min-height:100%;margin:0;background:#121212;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif}
      body{display:grid;place-items:center;padding:calc(24px + var(--safe-top)) 20px calc(24px + var(--safe-bottom))}
      .card{width:min(100%,380px);border:1px solid rgba(255,255,255,.1);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));padding:28px 22px 22px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.35)}
      .mark{display:grid;width:68px;height:68px;margin:0 auto 22px;place-items:center;border-radius:22px;background:#fff;color:#121212;font-size:32px;font-weight:900;letter-spacing:-.04em}
      h1{margin:0;font-size:22px;line-height:1.25;font-weight:800}
      p{margin:12px 0 0;color:rgba(255,255,255,.68);font-size:14px;line-height:1.7}
      .actions{display:grid;gap:10px;margin-top:24px}
      button,a{display:flex;height:46px;align-items:center;justify-content:center;border-radius:999px;border:0;font:inherit;font-size:15px;font-weight:800;text-decoration:none}
      button{background:#fff;color:#121212}
      a{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#fff}
      .hint{margin-top:14px;font-size:12px;color:rgba(255,255,255,.45)}
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <div class="mark" aria-hidden="true">Y</div>
      <h1>暂时连接不上月梦-快速版</h1>
      <p>可能是网络不稳定、服务器维护，或当前登录页还没有完成跳转。你可以重试，或先用浏览器打开网页版。</p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">重新连接</button>
        <a href="https://xse.yuelk.com/">打开网页版</a>
      </div>
      <p class="hint">网络恢复后，应用会自动尝试重新连接。</p>
    </main>
    <script>
      addEventListener("online", function () { window.location.reload(); });
      setInterval(function () {
        if (navigator.onLine) window.location.reload();
      }, 5000);
    </script>
  </body>
</html>
